<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <div id="bg" class="background"></div>

  <main class="center-content">
    <p id="greeting" class="greeting">Good morning, User</p>
    <p id="clock" class="clock">00:00</p>
    <p id="weather" class="weather weather--loading"></p>
  </main>

  <button id="settings-btn" class="icon-btn settings-btn" title="Settings">⚙️</button>
  <button id="refresh-btn" class="icon-btn refresh-btn" title="Refresh photo">🔄</button>

  <!-- Settings dropdown popup -->
  <div id="settings-popup" class="settings-popup" hidden>
    <div class="settings-popup-inner">
      <label for="popup-nickname" class="popup-label">Nickname</label>
      <div class="popup-input-row">
        <input
          type="text"
          id="popup-nickname"
          class="popup-input"
          maxlength="8"
          placeholder="e.g. Alex"
          autocomplete="off"
        />
        <span id="popup-nickname-count" class="popup-char-count">0/8</span>
      </div>
      <button id="popup-save-btn" class="popup-save-btn" type="button">Save</button>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
